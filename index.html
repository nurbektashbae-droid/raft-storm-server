<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевал: Сквозь Метель</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #121213; color: #e2e8f0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e1e24; border: 2px solid #3f3f46; border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        h1 { font-size: 20px; margin-bottom: 20px; color: #f1f5f9; text-transform: uppercase; letter-spacing: 2px; }
        input, select { width: 100%; padding: 12px; background: #27272a; border: 1px solid #4b5563; border-radius: 6px; color: #fff; text-align: center; font-size: 16px; margin-bottom: 12px; }
        select { text-align-last: center; }
        button { width: 100%; padding: 14px; background: #ea580c; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #c2410c; }
        button:disabled { background: #4b5563 !important; cursor: not-allowed; }
        .hidden { display: none; }
        .status-box { background: #27272a; border: 1px dashed #4b5563; padding: 10px; margin: 8px 0; border-radius: 6px; }
        #weather { font-size: 22px; color: #38bdf8; font-weight: bold; }
        #timer-text { font-size: 22px; color: #a3e635; font-weight: bold; }
        .bar { width: 100%; background: #27272a; height: 16px; border-radius: 10px; border: 1px solid #4b5563; overflow: hidden; margin-top: 5px; }
        .fill-warmth { height: 100%; width: 100%; background: #ef4444; transition: width 0.3s ease; }
        .fill-stamina { height: 100%; width: 100%; background: #eab308; transition: width 0.3s ease; }
        #log { background: #09090b; padding: 10px; height: 110px; overflow-y: auto; text-align: left; font-size: 12px; border-radius: 4px; border: 1px solid #27272a; color: #a1a1aa; margin-top: 10px; }
        #error-text { color: #ef4444; font-size: 12px; margin-top: 10px; text-align: left; }
        .btn-forest { background: #16a34a; margin-bottom: 10px; }
        .btn-forest:hover { background: #15803d; }
        .btn-rest { background: #2563eb; margin-bottom: 10px; }
        .btn-rest:hover { background: #1d4ed8; }
        .shop-btn { background: #52525b; padding: 6px; font-size: 11px; margin: 3px 0; width: 100%; text-align: left; }
        .shop-btn:hover { background: #71717a; }
    </style>
</head>
<body>
    <div id="lobby-screen" class="card">
        <h1>Сквозь Метель</h1>
        <p style="font-size: 14px; color: #a1a1aa; margin-bottom: 15px;">Выберите роль и создайте лагерь</p>
        
        <input type="text" id="nickname-input" placeholder="ВАШ НИКНЕЙМ" maxlength="12">
        
        <select id="role-input">
            <option value="lumberjack">🪓 Дровосек (+Дрова, Риск меньше)</option>
            <option value="keeper">🔥 Хранитель костра (+Эффект тепла)</option>
            <option value="scout">🧭 Проводник (Меньше теряется в буран)</option>
        </select>
        
        <hr style="border: 1px solid #27272a; margin-bottom: 15px;">
        <button onclick="createRoom()" style="background: #2563eb; margin-bottom: 12px;">Создать перевал</button>
        <div style="margin: 10px 0; color: #71717a;">— ИЛИ —</div>
        <input type="text" id="room-input" placeholder="КОД ИГРЫ (4 БУКВЫ)" maxlength="4" style="text-transform: uppercase;">
        <button onclick="joinRoom()">Войти в бурю</button>
        <div id="error-text"></div>
    </div>

    <div id="game-screen" class="card hidden">
        <h1 id="game-title">Перевал: ----</h1>
        
        <div class="status-box" style="display: flex; justify-content: space-between; align-items: center;">
            <span>До рассвета:</span>
            <span id="timer-text">02:00</span>
        </div>

        <div class="status-box">
            <div>Погода: <span id="weather">Ясно</span></div>
        </div>

        <div class="status-box">
            <div>Тепло в лагере: <span id="warmth-text">100%</span></div>
            <div class="bar"><div id="warmth-fill" class="fill-warmth"></div></div>
        </div>

        <div class="status-box" style="border-color: #eab308;">
            <div>Ваша Выносливость: <span id="stamina-text">100%</span></div>
            <div class="bar"><div id="stamina-fill" class="fill-stamina"></div></div>
        </div>

        <div class="status-box">
            <div>Дрова на складе: <span id="wood-count" style="font-weight: bold; color: #f97316;">0</span></div>
        </div>

        <div class="status-box" style="text-align: left; border-color: #a3e635;">
            <div style="font-size: 12px; margin-bottom: 5px; font-weight: bold; color: #a3e635;">🛠️ УЛУЧШЕНИЯ ЛАГЕРЯ:</div>
            <button id="up-canopy" class="shop-btn" onclick="sendAction('buy_canopy')">⛺ Укрепить Навес (25 дров)</button>
            <button id="up-axes" class="shop-btn" onclick="sendAction('buy_axes')">🪓 Наточить Топоры (30 дров)</button>
            <button id="up-scarfs" class="shop-btn" onclick="sendAction('buy_scarfs')">🧣 Теплые Шарфы (20 дров)</button>
        </div>

        <button id="burn-btn" onclick="burnWood()" style="margin-bottom: 10px; font-size: 15px;">🔥 БРОСИТЬ ДРОВО В КОСТЁР (-15 Энергии)</button>
        <button id="forest-btn" class="btn-forest" onclick="goToForest()">🌲 СХОДИТЬ В ЛЕС (-35 Энергии)</button>
        <button id="rest-btn" class="btn-rest" onclick="restAtCamp()">💤 ОТДОХНУТЬ У КОСТРА</button>
        
        <div style="display: flex; gap: 5px;">
            <button id="weather-btn" onclick="sendAction('change_weather')" style="background: #3f3f46; font-size: 11px; padding: 6px; width: 50%;">Переключить Буран</button>
            <button id="restart-btn" class="hidden" onclick="sendAction('restart_game')" style="background: #2563eb; width: 50%; padding: 6px; font-size: 11px;">🔄 СЛЕДУЮЩАЯ НОЧЬ</button>
        </div>
        
        <div id="log"></div>
    </div>

    <script>
        const HOST = window.location.host;
        const PROTOCOL = window.location.protocol;
        const WS_PROTOCOL = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        
        let ws;
        let myId = "";
        let myStamina = 100;
        let isActionLocked = false;
        let globalWood = 0;
        let costModifier = 0;
        let gameIsEnded = false;

        function showErr(msg) { 
            const errEl = document.getElementById('error-text');
            if (errEl) errEl.innerText = msg; 
        }
        
        function formatTime(secs) {
            let m = Math.floor(secs / 60).toString().padStart(2, '0');
            let s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }
        
        function getNickname() {
            let nick = document.getElementById('nickname-input').value.trim();
            return nick ? nick : "Странник_" + Math.floor(Math.random() * 100);
        }

        function updateStaminaUI() {
            document.getElementById('stamina-text').innerText = myStamina + "%";
            document.getElementById('stamina-fill').style.width = myStamina + "%";
            
            if (!isActionLocked && !gameIsEnded) {
                let burnCost = 15 - costModifier;
                let forestCost = 35 - costModifier;
                
                document.getElementById('burn-btn').disabled = (myStamina < burnCost);
                document.getElementById('forest-btn').disabled = (myStamina < forestCost);
                document.getElementById('rest-btn').disabled = false;
            }
        }

        async function createRoom() {
            try {
                let response = await fetch(`${PROTOCOL}//${HOST}/create_room`);
                if (!response.ok) throw new Error('Ошибка сервера');
                let data = await response.json();
                document.getElementById('room-input').value = data.room_code;
                joinRoom();
            } catch (e) { 
                showErr("Ошибка создания комнаты: " + e.message); 
            }
        }

        function joinRoom() {
            let code = document.getElementById('room-input').value.trim().toUpperCase();
            if (code.length !== 4) {
                showErr("Введите 4 буквы!");
                return;
            }
            
            myId = getNickname();
            let selectedRole = document.getElementById('role-input').value;

            try {
                ws = new WebSocket(`${WS_PROTOCOL}//${HOST}/ws/${code}/${myId}/${selectedRole}`);
                
                ws.onopen = () => {
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    document.getElementById('game-title').innerText = `Перевал: ${code}`;
                    gameIsEnded = false;
                    updateStaminaUI();
                };
                
                ws.onmessage = (event) => {
                    let data;
                    try {
                        data = JSON.parse(event.data);
                    } catch(e) {
                        return;
                    }
                    
                    if (data.type === "INIT_STATE" || data.type === "STATE_UPDATE" || data.type === "GAME_OVER" || data.type === "VICTORY") {
                        if (data.state && typeof data.state.player_stamina !== 'undefined') {
                            myStamina = Math.max(0, Math.min(100, data.state.player_stamina));
                        }
                        
                        globalWood = data.state.wood || 0;
                        document.getElementById('wood-count').innerText = globalWood;
                        
                        document.getElementById('weather').innerText = data.state.weather || "Ясно";
                        document.getElementById('weather').style.color = (data.state.weather === "Буран") ? "#ef4444" : "#38bdf8";
                        
                        document.getElementById('timer-text').innerText = formatTime(data.state.time_left || 120);
                        document.getElementById('warmth-text').innerText = (data.state.warmth || 100) + "%";
                        document.getElementById('warmth-fill').style.width = (data.state.warmth || 100) + "%";
                        
                        // Эффект шарфов
                        if (data.state.upgrades && data.state.upgrades.scarfs) {
                            costModifier = 5;
                            const scarfBtn = document.getElementById('up-scarfs');
                            scarfBtn.innerText = "🧣 Шарфы [КУПЛЕНО]";
                            scarfBtn.disabled = true;
                        } else {
                            costModifier = 0;
                            const scarfBtn = document.getElementById('up-scarfs');
                            scarfBtn.innerText = "🧣 Теплые Шарфы (20 дров)";
                            scarfBtn.disabled = (globalWood < 20);
                        }

                        // Навес
                        if (data.state.upgrades && data.state.upgrades.canopy) {
                            const canopyBtn = document.getElementById('up-canopy');
                            canopyBtn.innerText = "⛺ Навес [КУПЛЕНО]";
                            canopyBtn.disabled = true;
                        } else {
                            document.getElementById('up-canopy').disabled = (globalWood < 25);
                        }

                        // Топоры
                        if (data.state.upgrades && data.state.upgrades.axes) {
                            const axesBtn = document.getElementById('up-axes');
                            axesBtn.innerText = "🪓 Топоры [КУПЛЕНО]";
                            axesBtn.disabled = true;
                        } else {
                            document.getElementById('up-axes').disabled = (globalWood < 30);
                        }

                        if (data.log) addLog(data.log);

                        if (data.state.game_over) {
                            endGame("💀 ЗАМЕРЗЛИ", "#ef4444");
                        } else if (data.state.victory) {
                            endGame("☀️ РАССВЕТ!", "#a3e635");
                            document.getElementById('restart-btn').classList.remove('hidden');
                        } else {
                            if (data.type === "INIT_STATE") {
                                gameIsEnded = false;
                                const burnBtn = document.getElementById('burn-btn');
                                burnBtn.style.background = "#ea580c";
                                burnBtn.innerText = `🔥 БРОСИТЬ ДРОВО В КОСТЁР (-${15 - costModifier} Энергии)`;
                            }
                            document.getElementById('restart-btn').classList.add('hidden');
                        }
                        updateStaminaUI();
                    } else if (data.type === "PLAYER_JOINED") { 
                        addLog(`⛺ ${data.player_id} у костра.`); 
                    }
                };
                
                ws.onerror = () => { showErr("Ошибка подключения WebSocket"); };
                ws.onclose = () => { showErr("Соединение закрыто"); };
            } catch(e) { 
                showErr("Ошибка: " + e.message); 
            }
        }

        function setButtonsDisabled(status) {
            document.getElementById('burn-btn').disabled = status;
            document.getElementById('forest-btn').disabled = status;
            document.getElementById('rest-btn').disabled = status;
        }

        function burnWood() {
            if (isActionLocked || gameIsEnded) return;
            let cost = 15 - costModifier;
            if (myStamina < cost) return;
            myStamina -= cost;
            updateStaminaUI();
            sendAction('burn_one_wood');
        }

        function goToForest() {
            if (isActionLocked || gameIsEnded) return;
            let cost = 35 - costModifier;
            if (myStamina < cost) return;
            myStamina -= cost;
            
            isActionLocked = true;
            setButtonsDisabled(true);
            
            document.getElementById('forest-btn').innerText = "⏳ В ЛЕСУ (3с)...";
            sendAction('go_to_forest');
            
            setTimeout(() => {
                isActionLocked = false;
                document.getElementById('forest-btn').innerText = `🌲 СХОДИТЬ В ЛЕС (-${35 - costModifier} Энергии)`;
                updateStaminaUI();
            }, 3000);
        }

        function restAtCamp() {
            if (isActionLocked ||
