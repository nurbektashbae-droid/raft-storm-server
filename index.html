<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевал: Сквозь Метель</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #121213; color: #e2e8f0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e1e24; border: 2px solid #3f3f46; border-radius: 12px; padding: 24px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        h1 { font-size: 20px; margin-bottom: 20px; color: #f1f5f9; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; background: #27272a; border: 1px solid #4b5563; border-radius: 6px; color: #fff; text-align: center; font-size: 16px; margin-bottom: 12px; }
        button { width: 100%; padding: 14px; background: #ea580c; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #c2410c; margin-top: 0px; }
        button:disabled { background: #4b5563 !important; cursor: not-allowed; }
        .hidden { display: none; }
        .status-box { background: #27272a; border: 1px dashed #4b5563; padding: 10px; margin: 8px 0; border-radius: 6px; }
        .stat { font-size: 24px; font-weight: bold; color: #f97316; margin: 4px 0; }
        #weather { font-size: 22px; color: #38bdf8; font-weight: bold; }
        #timer-text { font-size: 22px; color: #a3e635; font-weight: bold; }
        #warmth-bar { width: 100%; background: #27272a; height: 16px; border-radius: 10px; border: 1px solid #4b5563; overflow: hidden; margin-top: 5px; }
        #warmth-fill { height: 100%; width: 100%; background: #ef4444; transition: width 0.3s ease; }
        #log { background: #09090b; padding: 10px; height: 130px; overflow-y: auto; text-align: left; font-size: 12px; border-radius: 4px; border: 1px solid #27272a; color: #a1a1aa; margin-top: 10px; }
        #error-text { color: #ef4444; font-size: 12px; margin-top: 10px; text-align: left; }
        .btn-forest { background: #16a34a; margin-bottom: 10px; }
        .btn-forest:hover { background: #15803d; }
    </style>
</head>
<body>
    <div id="lobby-screen" class="card">
        <h1>Сквозь Метель</h1>
        <p style="font-size: 14px; color: #a1a1aa; margin-bottom: 15px;">Укажите имя и создайте лагерь</p>
        
        <input type="text" id="nickname-input" placeholder="ВАШ НИКНЕЙМ" maxlength="12">
        <hr style="border: 1px solid #27272a; margin-bottom: 15px;">
        
        <button onclick="createRoom()" style="background: #2563eb; margin-bottom: 12px;">Создать перевал</button>
        <div style="margin: 10px 0; color: #71717a;">— ИЛИ —</div>
        <input type="text" id="room-input" placeholder="КОД ИГРЫ (4 БУКВЫ)" maxlength="4" style="text-transform: uppercase;">
        <button onclick="joinRoom()">Войти в бурю</button>
        <div id="error-text"></div>
    </div>

    <div id="game-screen" class="card hidden">
        <h1 id="game-title">Перевал: ----</h1>
        
        <div class="status-box" style="display: flex; justify-content: space-between; align-items: center;">
            <span>До рассвета:</span>
            <span id="timer-text">02:00</span>
        </div>

        <div class="status-box">
            <div>Погода: <span id="weather">Ясно</span></div>
        </div>

        <div class="status-box">
            <div>Тепло в лагере: <span id="warmth-text">100%</span></div>
            <div id="warmth-bar"><div id="warmth-fill"></div></div>
        </div>

        <div class="status-box">
            <div>Дрова на складе:</div>
            <div id="wood-count" class="stat">0</div>
        </div>

        <button id="burn-btn" onclick="sendAction('burn_one_wood')" style="margin-bottom: 10px; font-size: 16px;">🔥 БРОСИТЬ ДРОВО В КОСТЁР (+5% Тепла)</button>
        <button id="forest-btn" class="btn-forest" onclick="goToForest()">🌲 СХОДИТЬ В ЛЕС ЗА ДРОВАМИ</button>
        
        <button onclick="sendAction('change_weather')" style="background: #3f3f46; font-size: 11px; padding: 6px;">Переключить буран</button>
        
        <div id="log"></div>
    </div>

    <script>
        const HOST = window.location.host;
        const PROTOCOL = window.location.protocol === 'https:' ? 'https:' : 'http:';
        const WS_PROTOCOL = 'wss:';
        
        let ws;
        let myId = "";

        function showErr(msg) { document.getElementById('error-text').innerText = msg; }

        function formatTime(secs) {
            let m = Math.floor(secs / 60).toString().padStart(2, '0');
            let s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function getNickname() {
            let nick = document.getElementById('nickname-input').value.trim();
            return nick ? nick : "Странник_" + Math.floor(Math.random() * 100);
        }

        async function createRoom() {
            try {
                let response = await fetch(`${PROTOCOL}//${HOST}/create_room`);
                let data = await response.json();
                document.getElementById('room-input').value = data.room_code;
                joinRoom();
            } catch (e) { showErr("Ошибка: " + e.message); }
        }

        function joinRoom() {
            let code = document.getElementById('room-input').value.trim().toUpperCase();
            if (code.length !== 4) return alert("Введите 4 буквы кода!");
            
            myId = getNickname();

            try {
                ws = new WebSocket(`${WS_PROTOCOL}//${HOST}/ws/${code}/${myId}`);
                ws.onopen = () => {
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    document.getElementById('game-title').innerText = `Перевал: ${code}`;
                };
                ws.onmessage = (event) => {
                    let data = JSON.parse(event.data);
                    
                    if (data.type === "INIT_STATE" || data.type === "STATE_UPDATE" || data.type === "GAME_OVER" || data.type === "VICTORY") {
                        document.getElementById('wood-count').innerText = data.state.wood;
                        document.getElementById('weather').innerText = data.state.weather;
                        document.getElementById('weather').style.color = data.state.weather === "Буран" ? "#ef4444" : "#38bdf8";
                        
                        document.getElementById('timer-text').innerText = formatTime(data.state.time_left);
                        document.getElementById('warmth-text').innerText = data.state.warmth + "%";
                        document.getElementById('warmth-fill').style.width = data.state.warmth + "%";
                        
                        if (data.log) addLog(data.log);

                        if (data.state.game_over) {
                            endGame("ЗАМЕРЗЛИ", "#ef4444");
                        } else if (data.state.victory) {
                            endGame("РАССВЕТ!", "#a3e635");
                        }
                    } else if (data.type === "PLAYER_JOINED") { 
                        addLog(`⛺ ${data.player_id} у костра.`); 
                    }
                };
                ws.onerror = () => { showErr("Ошибка WebSocket"); };
            } catch(e) { showErr(e.message); }
        }

        function goToForest() {
            let btn = document.getElementById('forest-btn');
            btn.disabled = true;
            btn.innerText = "⏳ ИЩЕМ ДРОВА В ЛЕСУ (3с)...";
            
            sendAction('go_to_forest');
            
            setTimeout(() => {
                if(document.getElementById('burn-btn').innerText !== "ЗАМЕРЗЛИ" && document.getElementById('burn-btn').innerText !== "РАССВЕТ!") {
                    btn.disabled = false;
                    btn.innerText = "🌲 СХОДИТЬ В ЛЕС ЗА ДРОВАМИ";
                }
            }, 3000);
        }

        function endGame(msg, color) {
            document.getElementById('burn-btn').disabled = true;
            document.getElementById('forest-btn').disabled = true;
            document.getElementById('burn-btn').innerText = msg;
            document.getElementById('burn-btn').style.background = color;
        }

        function sendAction(act) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: act }));
            }
        }

        function addLog(txt) {
            let logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>` + txt + `</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>
</html>
